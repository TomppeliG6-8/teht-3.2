compose.yaml
services:
    watchtower:
        image: nickfedor/watchtower
        environment:
            - WATCHTOWER_POLL_INTERVAL=30 # Poll every 30 seconds
            - webapp
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        container_name: watchtower

    webapp:
        image: nginx
        volumes:
            - ./index.html:/usr/share/html/index.html
        ports:
            - "80:80"
            - "443:443"
        environment:
            - NGINX_PORT=80
